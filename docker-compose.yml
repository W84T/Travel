services:
  nginx:
    image: nginx:alpine
    container_name: tourism_nginx

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - app

    networks:
      - tourism_net
      - web # Directly use 'web' here to eliminate naming confusion

    restart: unless-stopped

    labels:
      - traefik.enable=true
      # Changed from 'test' to 'tourism_prod' to prevent VPS service collisions
      - traefik.http.routers.tourism_prod.rule=Host(`test.alam-aldyara.com`)
      - traefik.http.routers.tourism_prod.entrypoints=websecure
      - traefik.http.routers.tourism_prod.tls.certresolver=le
      - traefik.http.services.tourism_prod_service.loadbalancer.server.port=80
      - traefik.docker.network=web

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: tourism_app

    env_file:
      - .env.docker

    volumes:
      - app_data:/app/data

    networks:
      - tourism_net

    restart: unless-stopped

networks:
  tourism_net:
    driver: bridge

  # Defined clearly to match what your global Traefik stack expects
  web:
    external: true

volumes:
  app_data: