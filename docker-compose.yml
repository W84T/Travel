services:
  nginx:
    image: nginx:alpine

    container_name: tourism_nginx

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - app
      - pocketbase

    networks:
      - tourism_net
      - traefik

    restart: unless-stopped

    labels:
      - traefik.enable=true

      - traefik.http.routers.test.rule=Host(`test.alam-aldyara.com`)

      - traefik.http.routers.test.entrypoints=websecure

      - traefik.http.routers.test.tls.certresolver=letsencrypt

      - traefik.http.services.test.loadbalancer.server.port=80

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: tourism_app

    env_file:
      - .env.docker

    volumes:
      - app_data:/app/data

    depends_on:
      - pocketbase

    networks:
      - tourism_net

    restart: unless-stopped

  pocketbase:
    image: spectado/pocketbase:latest

    container_name: tourism_pocketbase

    volumes:
      - pb_data:/pb_data

    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY:-default_dev_key_change_me}

    networks:
      - tourism_net

    restart: unless-stopped

networks:
  tourism_net:
    driver: bridge

  traefik:
    external: true

volumes:
  app_data:
  pb_data: